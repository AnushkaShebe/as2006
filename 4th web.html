<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Record Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        table {
            width: 80%;
            border-collapse: collapse;
            margin: auto;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        caption {
            font-size: 1.5em;
            margin: 10px;
            font-weight: bold;
            color: #333;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }
        thead {
            background-color: #4CAF50;
            color: white;
        }
        tfoot {
            background-color: #f1f1f1;
            font-weight: bold;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover {
            background-color: #e6f7ff;
        }
    </style>
</head>
<body>

    <table>
        <caption>Student Academic Record - 2026</caption>
        <thead>
            <tr>
                <th rowspan="2">Roll No</th>
                <th rowspan="2">Name</th>
                <th colspan="3">Marks</th>
                <th rowspan="2">Total</th>
                <th rowspan="2">Grade</th>
            </tr>
            <tr>
                <th>Math</th>
                <th>Science</th>
                <th>English</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>101</td>
                <td>Amit Sharma</td>
                <td>85</td>
                <td>90</td>
                <td>88</td>
                <td>263</td>
                <td>A</td>
            </tr>
            <tr>
                <td>102</td>
                <td>Priya Verma</td>
                <td>78</td>
                <td>82</td>
                <td>80</td>
                <td>240</td>
                <td>B+</td>
            </tr>
            <tr>
                <td>103</td>
                <td>Rahul Mehta</td>
                <td>92</td>
                <td>95</td>
                <td>89</td>
                <td>276</td>
                <td>A+</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="5">Class Average</td>
                <td>259.67</td>
                <td>A</td>
            </tr>
        </tfoot>
    </table>

</body>
</html>
